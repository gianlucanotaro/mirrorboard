services:
  mongodb:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: ${MONGODB_DB:-mirrorboard}
      PORT: "8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - internal

networks:
  internal:

volumes:
  mongo_data:
